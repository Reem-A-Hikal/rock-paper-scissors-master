<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Rock, Paper, Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=DM+Sans:opsz,wght@9..40,100..1000&family=League+Spartan:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1 class="title">
          <span>Rock</span>
          <span>Paper</span>
          <span> Scissors </span>
        </h1>
        <div class="score">
          <span>score</span>
          <span class="your-score">0</span>
        </div>
      </header>
      <section class="selection-screen">
        <button type="button" class="circle paper" aria-label="paper"></button>
        <button type="button" class="circle scissors" aria-label="scissors"></button>
        <button type="button" class="circle rock" aria-label="rock"></button>
      </section>
      <section class="result-screen hidden">
        <div class="you-picked">
          <span>You Picked</span>
          <div class="circle"></div>
        </div>
        <div class="result-message">
          <span></span>
          <button type="button">PLAY AGAIN</button>
        </div>
        <div class="house-picked">
          <span>The House Picked</span>
          <div class="hidden-circle"></div>
        </div>
      </section>
    </main>
    <div class="modal hidden">
      <header>
        <h1>RULES</h1>
        <button class="close" type="button"><img src="./images/icon-close.svg" alt="close"></button>
      </header>
      <div><img src="./images/image-rules.svg" alt="rules"></div>
    </div>
    <footer>
      <button type="button">rules</button>
    </footer>

    <div class="overlay hidden"></div>

    <script src="./script.js"></script>
  </body>
</html>
